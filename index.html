
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="bastion-app" content="true" />
    <meta name="theme-color" content="#020617" />
    
    <!-- 
      DEBUG CSP: Permissive to identify loading issues.
      Once stable, restrict to 'self' and specific CDNs.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">

    <link rel="manifest" href="/manifest.json" />
    <title>Bastion Enclave | Secure Boot</title>

    <!-- 1. CRITICAL RUNTIME POLYFILLS -->
    <script>
      window.global = window;
      window.process = { env: { NODE_ENV: 'development' } };
      window.Buffer = window.Buffer || {
        isBuffer: function() { return false; },
        from: function(data) { 
          return typeof data === 'string' ? new TextEncoder().encode(data) : new Uint8Array(data); 
        },
        alloc: function(size) { return new Uint8Array(size); },
        byteLength: function(str) { return str.length; }
      };
    </script>

    <!-- Global Error Handler for Script Errors -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        // Ignore resize observations
        if (msg === 'Script error.') {
          console.error("CORS Error: A script failed to load from a different origin. Check your connection or VPN.");
          // We can't show details for Script error due to browser security, but we can show a hint.
          msg = "External Script Failed (CORS). Check Console.";
        }
        
        var overlay = document.getElementById('boot-error');
        if (!overlay) {
           overlay = document.createElement('div');
           overlay.id = 'boot-error';
           overlay.style.cssText = 'position:fixed;bottom:20px;left:20px;right:20px;background:#7f1d1d;color:#fecaca;padding:15px;border-radius:8px;font-family:monospace;font-size:12px;z-index:99999;border:1px solid #ef4444;';
           document.body.appendChild(overlay);
        }
        overlay.innerText = "BOOT ERROR: " + msg;
      };
    </script>


    


    <style>
      body {
        background-color: #020617;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #boot-loader {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #020617;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-left-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot-loader">
      <div class="spinner"></div>
      <p style="margin-top: 20px; font-family: monospace; font-size: 12px; color: #64748b;">
        INITIALIZING ENCLAVE...
      </p>
    </div>

    <div id="root"></div>

    <script type="module">
      // Remove loader when React mounts
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').childElementCount > 0) {
          const loader = document.getElementById('boot-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>

    <script type="module" src="/index.tsx"></script>
  </body>
</html>
